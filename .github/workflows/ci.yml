name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - run: rustup default stable
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo test --locked --all-targets
      - run: cargo check --locked --all-targets --features cuda
      - run: cargo package --locked

  rust-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - run: cargo test --locked --all-targets

  metal:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component clippy
      - run: rustup default stable
      - run: cargo clippy --locked --all-targets --features metal -- -D warnings
      - run: cargo test --locked --all-targets --features metal

  jax:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: jax
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff format --check python tests
      - run: uv run ruff check python tests
      - run: uv run mypy
      - run: uv run pytest -m "not cuda"
